name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ACR_NAME: visitorcounteracr
  IMAGE_NAME: visitor-counter

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Set Azure subscription
      run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.7.0
    - name: Terraform init
      run: |
        cd infra/terraform
        echo "Initializing Terraform with local backend..."
        terraform init -backend=false -input=false
        echo "Terraform initialization completed"
    - name: Terraform apply
      run: |
        cd infra/terraform
        echo "Running terraform plan..."
        terraform plan -out=tfplan -input=false
        echo "Running terraform apply..."
        terraform apply -auto-approve tfplan
    - name: Cleanup
      if: always()
      run: |
        cd infra/terraform
        rm -f terraform.tfstate terraform.tfstate.backup tfplan

  build-and-push:
    needs: provision
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Set Azure subscription
      run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Build and push Docker image
      run: |
        docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} ./src/VisitorCounter
        az acr login --name ${{ env.ACR_NAME }}
        docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Set Azure subscription
      run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Set AKS context
      run: az aks get-credentials --resource-group visitor-counter-rg --name visitor-counter-aks
    - name: Deploy to AKS
      run: |
        kubectl set image deployment/visitor-counter visitor-counter=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
        kubectl apply -f k8s/