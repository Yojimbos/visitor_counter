name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ACR_NAME: visitorcounteracr
  IMAGE_NAME: visitor-counter
  AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Set Azure subscription
      run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.7.0
    - name: Terraform init
      run: |
        cd infra/terraform
        echo "Disabling Azure backend for CI/CD..."
        mv backend.tf backend.tf.bak || true
        echo "Initializing Terraform with local backend..."
        terraform init -backend=false -input=false
        echo "Terraform initialization completed"
    - name: Import existing resources
      run: |
        cd infra/terraform
    - name: Terraform apply (Azure infra)
      run: |
        cd infra/terraform
        echo "Running terraform plan..."
        terraform plan -out=tfplan -input=false
        echo "Running terraform apply..."
        terraform apply -auto-approve tfplan
    - name: Restore backend
      if: always()
      run: |
        cd infra/terraform
        mv backend.tf.bak backend.tf || true
    - name: Cleanup
      if: always()
      run: |
        cd infra/terraform
        rm -f terraform.tfstate terraform.tfstate.backup tfplan

  helm-deploy:
    needs: provision
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Set Azure subscription
      run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.7.0
    - name: Terraform init (Helm)
      run: |
        cd infra/terraform
        mv backend.tf backend.tf.bak || true
        terraform init -backend=false -input=false
    - name: Terraform apply (Helm resources)
      run: |
        cd infra/terraform
        terraform plan -target=helm_release.ingress_nginx -out=tfplan -input=false
        terraform apply -auto-approve tfplan
    - name: Restore backend
      if: always()
      run: |
        cd infra/terraform
        mv backend.tf.bak backend.tf || true
    - name: Cleanup
      if: always()
      run: |
        cd infra/terraform
        rm -f terraform.tfstate terraform.tfstate.backup tfplan