name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  ACR_NAME: visitorcounteracr
  IMAGE_NAME: visitor-counter
  RG_NAME: visitor-counter-rg
  AKS_NAME: visitor-counter-aks

jobs:

  # =========================
  # 1. TERRAFORM PLAN
  # =========================
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: |
          cd infra/terraform
          terraform init -input=false

      - name: Terraform Validate
        run: |
          cd infra/terraform
          terraform validate

      - name: Terraform Plan
        run: |
          cd infra/terraform
          terraform plan -out=tfplan -input=false

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/terraform/tfplan

  # =========================
  # 2. TERRAFORM APPLY
  # =========================
  terraform-apply:
    needs: terraform-plan
    if: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Download tfplan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra/terraform

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: |
          cd infra/terraform
          terraform init -input=false

      - name: Terraform Apply
        run: |
          cd infra/terraform
          terraform apply -auto-approve tfplan

  # =========================
  # 3. BUILD & PUSH IMAGE
  # =========================
  build-and-push:
    needs: terraform-apply
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}

          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:$IMAGE_TAG \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            ./src/VisitorCounter

          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:$IMAGE_TAG
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

  # =========================
  # 4. DEPLOY TO AKS
  # =========================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RG_NAME }} \
            --name ${{ env.AKS_NAME }} \
            --overwrite-existing

      - name: Deploy to Kubernetes
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

          kubectl set image deployment/visitor-counter visitor-counter=$IMAGE
          kubectl rollout status deployment/visitor-counter