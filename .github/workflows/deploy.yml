name: Deploy to AKS

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/**'
      - '.github/workflows/deploy.yml'
  workflow_run:
    workflows: ["Build and Push to ACR"]
    types:
      - completed
    branches:
      - main

env:
  AKS_CLUSTER_NAME: visitor-counter-aks
  AKS_RESOURCE_GROUP: visitor-counter-rg
  IMAGE_NAME: visitor-counter
  NAMESPACE: default

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure correct Azure subscription
        run: |
          az account show
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify AKS cluster exists
        run: |
          echo "Verifying AKS cluster '${AKS_CLUSTER_NAME}' in '${AKS_RESOURCE_GROUP}'..."
          if ! az aks show --resource-group $AKS_RESOURCE_GROUP --name $AKS_CLUSTER_NAME &>/dev/null; then
            echo "ERROR: AKS cluster not found. Please run the provision job in CI/CD pipeline first."
            exit 1
          fi
          echo "✓ AKS cluster exists and is ready"

      - name: Discover ACR registry name
        run: |
          REGISTRY_NAME=$(az acr list --resource-group $AKS_RESOURCE_GROUP --query "[?starts_with(name, 'visitorcounteracr')].name | [0]" -o tsv)
          echo "REGISTRY_NAME=${REGISTRY_NAME}" >> $GITHUB_ENV
          echo "Using ACR registry: ${REGISTRY_NAME}"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $AKS_RESOURCE_GROUP \
            --name $AKS_CLUSTER_NAME

      - name: Retrieve database secrets from Key Vault
        run: |
          KEYVAULT_NAME=$(az keyvault list --resource-group $AKS_RESOURCE_GROUP --query "[0].name" -o tsv)
          if [ -z "$KEYVAULT_NAME" ]; then
            echo "ERROR: No Key Vault found in resource group"
            exit 1
          fi

          DB_PASSWORD=$(az keyvault secret show --vault-name $KEYVAULT_NAME --name postgres-password --query value -o tsv 2>/dev/null || echo "")
          CONNECTION_STRING=$(az keyvault secret show --vault-name $KEYVAULT_NAME --name ConnectionStrings--DefaultConnection --query value -o tsv 2>/dev/null || echo "")

          if [ -z "$DB_PASSWORD" ]; then
            echo "ERROR: postgres-password secret is empty or missing"
            exit 1
          fi

          kubectl create secret generic visitor-counter-secret \
            --from-literal=DB_HOST="visitor-counter-postgres-ne.postgres.database.azure.com" \
            --from-literal=DB_USER="postgresadmin" \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            --from-literal=ConnectionStrings__DefaultConnection="$CONNECTION_STRING" \
            --dry-run=client -o yaml | kubectl apply -f -
              
      - name: Get latest image tag from ACR
        id: acr_tag
        run: |
          LATEST_TAG=$(az acr repository show-tags \
            --name $REGISTRY_NAME \
            --repository $IMAGE_NAME \
            --orderby time_desc \
            --query '[0]' -o tsv)
          echo "tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "Latest image tag: ${LATEST_TAG}"

      - name: Deploy to Kubernetes
        run: |
          # Update deployment image with the latest tag
          sed -i "s/\$(GIT_COMMIT_HASH)/${{ steps.acr_tag.outputs.tag }}/g" k8s/deployment.yaml
          
          # Apply all K8s resources
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml
          
          echo "✓ Kubernetes resources deployed"

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to be ready..."
          kubectl rollout status deployment/visitor-counter -n $NAMESPACE --timeout=5m
          echo "✓ Deployment is ready"
          
          echo "Listing pods..."
          kubectl get pods -n $NAMESPACE -l app=visitor-counter
          
          echo "✓ Deployment verification complete"
