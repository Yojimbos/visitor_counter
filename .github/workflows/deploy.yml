name: Deploy to AKS

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Push to ACR"]
    types: [completed]
    branches: [main]

env:
  AKS_CLUSTER_NAME: visitor-counter-aks
  AKS_RESOURCE_GROUP: visitor-counter-rg
  IMAGE_NAME: visitor-counter
  NAMESPACE: default

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $AKS_RESOURCE_GROUP \
            --name $AKS_CLUSTER_NAME \
            --overwrite-existing

      - name: Install ingress-nginx
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace

      - name: Wait ingress-nginx
        run: |
          kubectl rollout status deployment/ingress-nginx-controller -n ingress-nginx --timeout=10m

      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set crds.enabled=true

      - name: Wait cert-manager
        run: |
          kubectl rollout status deployment/cert-manager -n cert-manager --timeout=10m
          kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=10m
          kubectl rollout status deployment/cert-manager-cainjector -n cert-manager --timeout=10m

      - name: Get ingress IP
        id: ip
        run: |
          for i in {1..60}; do
            IP=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            if [ -n "$IP" ]; then
              echo "ip=$IP" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Waiting for ingress IP..."
            sleep 10
          done
          echo "Ingress IP not found"
          exit 1

      - name: Build hostname (sslip.io)
        id: host
        run: |
          HOST="visitor-counter.${{ steps.ip.outputs.ip }}.sslip.io"
          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "Using hostname: $HOST"

      - name: Create ClusterIssuer
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              email: ${{ secrets.LETSENCRYPT_EMAIL }}
              server: https://acme-v02.api.letsencrypt.org/directory
              privateKeySecretRef:
                name: letsencrypt-prod
              solvers:
              - http01:
                  ingress:
                    class: nginx
          EOF

      - name: Get latest image tag from ACR
        id: tag
        run: |
          REGISTRY=$(az acr list --resource-group $AKS_RESOURCE_GROUP --query "[0].name" -o tsv)
          TAG=$(az acr repository show-tags \
            --name $REGISTRY \
            --repository $IMAGE_NAME \
            --orderby time_desc \
            --query "[0]" -o tsv)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using image tag: $TAG"

      - name: Read DB password from Key Vault
        id: db
        run: |
          KV=$(az keyvault list --resource-group $AKS_RESOURCE_GROUP --query "[0].name" -o tsv)
          PASS=$(az keyvault secret show --vault-name $KV --name postgres-password --query value -o tsv)

          CONN="Host=visitor-counter-postgres-ne.postgres.database.azure.com;Database=visitorcounter;Username=postgresadmin;Password=${PASS};SSL Mode=Require;Trust Server Certificate=true;"

          {
            echo "pass<<EOF"
            echo "$PASS"
            echo "EOF"
            echo "conn<<EOF"
            echo "$CONN"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Read backup storage settings from Key Vault
        id: backup
        run: |
          KV=$(az keyvault list --resource-group $AKS_RESOURCE_GROUP --query "[0].name" -o tsv)
          ACCOUNT=$(az keyvault secret show --vault-name $KV --name backup-storage-account-name --query value -o tsv 2>/dev/null || true)
          KEY=$(az keyvault secret show --vault-name $KV --name backup-storage-account-key --query value -o tsv 2>/dev/null || true)
          CONTAINER=$(az keyvault secret show --vault-name $KV --name backup-storage-container --query value -o tsv 2>/dev/null || true)

          if [ -z "$ACCOUNT" ] || [ -z "$KEY" ] || [ -z "$CONTAINER" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "enabled=true"
            echo "account<<EOF"
            echo "$ACCOUNT"
            echo "EOF"
            echo "key<<EOF"
            echo "$KEY"
            echo "EOF"
            echo "container<<EOF"
            echo "$CONTAINER"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Kubernetes secret
        run: |
          kubectl delete secret visitor-counter-secret -n $NAMESPACE --ignore-not-found=true

          kubectl create secret generic visitor-counter-secret \
            -n $NAMESPACE \
            --from-literal=DB_HOST=visitor-counter-postgres-ne.postgres.database.azure.com \
            --from-literal=DB_USER=postgresadmin \
            --from-literal=DB_PASSWORD='${{ steps.db.outputs.pass }}' \
            --from-literal=ConnectionStrings__DefaultConnection='${{ steps.db.outputs.conn }}'

      - name: Create backup secret
        if: ${{ steps.backup.outputs.enabled == 'true' }}
        run: |
          kubectl delete secret visitor-counter-backup-secret -n $NAMESPACE --ignore-not-found=true

          kubectl create secret generic visitor-counter-backup-secret \
            -n $NAMESPACE \
            --from-literal=BACKUP_STORAGE_ACCOUNT='${{ steps.backup.outputs.account }}' \
            --from-literal=BACKUP_STORAGE_KEY='${{ steps.backup.outputs.key }}' \
            --from-literal=BACKUP_STORAGE_CONTAINER='${{ steps.backup.outputs.container }}'

      - name: Reset old TLS resources
        run: |
          kubectl delete certificate visitor-counter-tls -n $NAMESPACE --ignore-not-found=true
          kubectl delete secret visitor-counter-tls -n $NAMESPACE --ignore-not-found=true
          kubectl delete challenge --all -n $NAMESPACE --ignore-not-found=true || true
          kubectl delete order --all -n $NAMESPACE --ignore-not-found=true || true
          kubectl delete certificaterequest --all -n $NAMESPACE --ignore-not-found=true || true

      - name: Render manifests
        run: |
          cp k8s/deployment.yaml /tmp/deployment.yaml
          cp k8s/ingress.yaml /tmp/ingress.yaml

          sed -i "s|IMAGE_TAG|${{ steps.tag.outputs.tag }}|g" /tmp/deployment.yaml
          sed -i "s|APP_HOSTNAME|${{ steps.host.outputs.host }}|g" /tmp/ingress.yaml

          echo "Rendered ingress:"
          cat /tmp/ingress.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f /tmp/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f /tmp/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Apply backup CronJob when backup storage is configured
        if: ${{ steps.backup.outputs.enabled == 'true' }}
        run: |
          kubectl apply -f k8s/backup-cronjob.yaml

      - name: Apply ServiceMonitor when monitoring stack is installed
        run: |
          if kubectl get crd servicemonitors.monitoring.coreos.com >/dev/null 2>&1; then
            kubectl apply -f k8s/servicemonitor.yaml
          else
            echo "ServiceMonitor CRD not found, skipping application metrics registration."
          fi

      - name: Wait for app rollout
        run: |
          kubectl rollout status deployment/visitor-counter -n $NAMESPACE --timeout=10m

      - name: Wait for TLS secret
        run: |
          for i in {1..60}; do
            if kubectl get secret visitor-counter-tls -n $NAMESPACE >/dev/null 2>&1; then
              echo "TLS secret created"
              exit 0
            fi
            echo "Waiting for visitor-counter-tls..."
            sleep 10
          done

          kubectl get certificate -n $NAMESPACE || true
          kubectl get certificaterequest -n $NAMESPACE || true
          kubectl get challenge -n $NAMESPACE || true
          kubectl get order -n $NAMESPACE || true
          exit 1

      - name: Smoke test
        run: |
          URL="https://${{ steps.host.outputs.host }}"
          echo "Testing $URL"

          for i in {1..30}; do
            code=$(curl -k -s -o /dev/null -w "%{http_code}" "$URL" || true)
            if [ "$code" = "200" ]; then
              echo "SUCCESS: $URL"
              exit 0
            fi
            echo "Current code: $code"
            sleep 10
          done

          kubectl logs -n ingress-nginx deploy/ingress-nginx-controller --tail=100 || true
          kubectl logs -n $NAMESPACE deploy/visitor-counter --tail=100 || true
          exit 1
