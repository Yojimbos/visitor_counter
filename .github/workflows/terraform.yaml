name: Terraform

on:
  push:
    branches: [ main ]
    paths:
      - 'infra/terraform/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'infra/terraform/**'

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Disable Azure backend for CI/CD
      run: mv backend.tf backend.tf.bak || true
      working-directory: infra/terraform
    - name: Terraform Init
      run: terraform init -backend=false
      working-directory: infra/terraform
    - name: Import existing resources
      run: |
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          RG_NAME="visitor-counter-rg"
          KV_NAME="visitor-kv-20260410"

          import_if_missing () {
            RESOURCE=$1
            ID=$2
            if ! terraform state list | grep -q "$RESOURCE"; then
              terraform import -input=false $RESOURCE "$ID" || true
            else
              echo "Skip import: $RESOURCE already in state"
            fi
          }

          # Resource group
          if az group exists --name $RG_NAME; then
            import_if_missing "azurerm_resource_group.rg" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME"
          fi

          # Virtual network
          if az network vnet show --resource-group $RG_NAME --name visitor-counter-vnet >/dev/null 2>&1; then
            import_if_missing "azurerm_virtual_network.visitor-counter_vnet" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.Network/virtualNetworks/visitor-counter-vnet"
          fi

          # Subnet
          if az network vnet subnet show --resource-group $RG_NAME --vnet-name visitor-counter-vnet --name visitor-counter-aks-subnet >/dev/null 2>&1; then
            import_if_missing "azurerm_subnet.aks_subnet" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.Network/virtualNetworks/visitor-counter-vnet/subnets/visitor-counter-aks-subnet"
          fi
        
          # AKS cluster
          if az aks show --resource-group $RG_NAME --name visitor-counter-aks >/dev/null 2>&1; then
            import_if_missing "azurerm_kubernetes_cluster.aks" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.ContainerService/managedClusters/visitor-counter-aks"
          fi

          # Key Vault secrets
          DB_HOST_URI=$(az keyvault secret show --vault-name $KV_NAME --name db-host --query id -o tsv 2>/dev/null || echo "")
          if [ -n "$DB_HOST_URI" ]; then
            import_if_missing "azurerm_key_vault_secret.db_host" "$DB_HOST_URI"
          fi
      working-directory: infra/terraform
    - name: Terraform Plan
      run: terraform plan
      working-directory: infra/terraform
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve
      working-directory: infra/terraform
    - name: Restore backend
      if: always()
      run: mv backend.tf.bak backend.tf || true
      working-directory: infra/terraform
    - name: Cleanup
      if: always()
      run: |
        rm -f terraform.tfstate terraform.tfstate.backup
      working-directory: infra/terraform