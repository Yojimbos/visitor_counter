name: Terraform

on:
  push:
    branches: [ "**" ]
    paths:
      - 'infra/terraform/**'
  pull_request:
    branches: [ "**" ]
    paths:
      - 'infra/terraform/**'

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Disable Azure backend for CI/CD
      run: mv backend.tf backend.tf.bak || true
      working-directory: infra/terraform
    - name: Terraform Init
      run: terraform init -backend=false
      working-directory: infra/terraform
    - name: Import existing resources
      run: |
        SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        RG_NAME="visitor-counter-rg"
        ACR_NAME="visitorcounteracr"
        KV_NAME="visitor-kv-20260410"
        POSTGRES_NAME="visitor-counter-postgres-ne"
        DB_NAME="visitorcounter"
        BACKUP_STORAGE=$(az storage account list --resource-group $RG_NAME --query "[?starts_with(name, 'vcbackup')].name | [0]" -o tsv 2>/dev/null || echo "")
        CURRENT_OBJECT_ID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv 2>/dev/null || echo "")
        KUBELET_OBJECT_ID=$(az aks show --resource-group $RG_NAME --name visitor-counter-aks --query identityProfile.kubeletidentity.objectId -o tsv 2>/dev/null || echo "")

        import_if_missing () {
          RESOURCE=$1
          ID=$2
          if ! terraform state list | grep -q "$RESOURCE"; then
            terraform import -input=false $RESOURCE "$ID" || true
          else
            echo "Skip import: $RESOURCE already in state"
          fi
        }

        # Resource group
        if az group exists --name $RG_NAME; then
          import_if_missing "azurerm_resource_group.rg" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME"
        fi

        # Container registry
        if az acr show --resource-group $RG_NAME --name $ACR_NAME >/dev/null 2>&1; then
          import_if_missing "azurerm_container_registry.acr" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.ContainerRegistry/registries/$ACR_NAME"
        fi

        # Key Vault
        if az keyvault show --resource-group $RG_NAME --name $KV_NAME >/dev/null 2>&1; then
          import_if_missing "azurerm_key_vault.kv" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.KeyVault/vaults/$KV_NAME"
        fi

        # Key Vault access policies
        if [ -n "$CURRENT_OBJECT_ID" ]; then
          import_if_missing "azurerm_key_vault_access_policy.current" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.KeyVault/vaults/$KV_NAME/objectId/$CURRENT_OBJECT_ID"
        fi

        if [ -n "$KUBELET_OBJECT_ID" ]; then
          import_if_missing "azurerm_key_vault_access_policy.aks_identity" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.KeyVault/vaults/$KV_NAME/objectId/$KUBELET_OBJECT_ID"
        fi

        # Virtual network
        if az network vnet show --resource-group $RG_NAME --name visitor-counter-vnet >/dev/null 2>&1; then
          import_if_missing "azurerm_virtual_network.visitor-counter_vnet" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.Network/virtualNetworks/visitor-counter-vnet"
        fi

        # Subnet
        if az network vnet subnet show --resource-group $RG_NAME --vnet-name visitor-counter-vnet --name visitor-counter-aks-subnet >/dev/null 2>&1; then
          import_if_missing "azurerm_subnet.aks_subnet" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.Network/virtualNetworks/visitor-counter-vnet/subnets/visitor-counter-aks-subnet"
        fi

        # AKS cluster
        if az aks show --resource-group $RG_NAME --name visitor-counter-aks >/dev/null 2>&1; then
          import_if_missing "azurerm_kubernetes_cluster.aks" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.ContainerService/managedClusters/visitor-counter-aks"
        fi

        # PostgreSQL flexible server
        if az postgres flexible-server show --resource-group $RG_NAME --name $POSTGRES_NAME >/dev/null 2>&1; then
          import_if_missing "azurerm_postgresql_flexible_server.postgres" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.DBforPostgreSQL/flexibleServers/$POSTGRES_NAME"
        fi

        # PostgreSQL database
        if az postgres flexible-server db show --resource-group $RG_NAME --server-name $POSTGRES_NAME --database-name $DB_NAME >/dev/null 2>&1; then
          import_if_missing "azurerm_postgresql_flexible_server_database.db" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.DBforPostgreSQL/flexibleServers/$POSTGRES_NAME/databases/$DB_NAME"
        fi

        # Backup storage resources
        if [ -n "$BACKUP_STORAGE" ]; then
          import_if_missing "azurerm_storage_account.backup" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.Storage/storageAccounts/$BACKUP_STORAGE"

          if az storage container exists --account-name $BACKUP_STORAGE --name postgres-logical-backups --auth-mode login --query exists -o tsv 2>/dev/null | grep -qi true; then
            import_if_missing "azurerm_storage_container.logical_backups" "https://$BACKUP_STORAGE.blob.core.windows.net/postgres-logical-backups"
          fi

          if az storage account management-policy show --account-name $BACKUP_STORAGE --resource-group $RG_NAME >/dev/null 2>&1; then
            import_if_missing "azurerm_storage_management_policy.backup_retention" "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.Storage/storageAccounts/$BACKUP_STORAGE/managementPolicies/default"
          fi
        fi

        # Key Vault secrets
        DB_HOST_URI=$(az keyvault secret show --vault-name $KV_NAME --name db-host --query id -o tsv 2>/dev/null || echo "")
        if [ -n "$DB_HOST_URI" ]; then
          import_if_missing "azurerm_key_vault_secret.db_host" "$DB_HOST_URI"
        fi

        DB_USER_URI=$(az keyvault secret show --vault-name $KV_NAME --name db-user --query id -o tsv 2>/dev/null || echo "")
        if [ -n "$DB_USER_URI" ]; then
          import_if_missing "azurerm_key_vault_secret.db_user" "$DB_USER_URI"
        fi

        DB_PASSWORD_URI=$(az keyvault secret show --vault-name $KV_NAME --name ConnectionStrings--DefaultConnection --query id -o tsv 2>/dev/null || echo "")
        if [ -n "$DB_PASSWORD_URI" ]; then
          import_if_missing "azurerm_key_vault_secret.db_password" "$DB_PASSWORD_URI"
        fi

        POSTGRES_ADMIN_URI=$(az keyvault secret show --vault-name $KV_NAME --name postgres-password --query id -o tsv 2>/dev/null || echo "")
        if [ -n "$POSTGRES_ADMIN_URI" ]; then
          import_if_missing "azurerm_key_vault_secret.postgres_password" "$POSTGRES_ADMIN_URI"
        fi

        ACR_LOGIN_URI=$(az keyvault secret show --vault-name $KV_NAME --name acr-login-server --query id -o tsv 2>/dev/null || echo "")
        if [ -n "$ACR_LOGIN_URI" ]; then
          import_if_missing "azurerm_key_vault_secret.acr_login_server" "$ACR_LOGIN_URI"
        fi

        BACKUP_ACCOUNT_URI=$(az keyvault secret show --vault-name $KV_NAME --name backup-storage-account-name --query id -o tsv 2>/dev/null || echo "")
        if [ -n "$BACKUP_ACCOUNT_URI" ]; then
          import_if_missing "azurerm_key_vault_secret.backup_storage_account_name" "$BACKUP_ACCOUNT_URI"
        fi

        BACKUP_KEY_URI=$(az keyvault secret show --vault-name $KV_NAME --name backup-storage-account-key --query id -o tsv 2>/dev/null || echo "")
        if [ -n "$BACKUP_KEY_URI" ]; then
          import_if_missing "azurerm_key_vault_secret.backup_storage_account_key" "$BACKUP_KEY_URI"
        fi

        BACKUP_CONTAINER_URI=$(az keyvault secret show --vault-name $KV_NAME --name backup-storage-container --query id -o tsv 2>/dev/null || echo "")
        if [ -n "$BACKUP_CONTAINER_URI" ]; then
          import_if_missing "azurerm_key_vault_secret.backup_storage_container" "$BACKUP_CONTAINER_URI"
        fi
      working-directory: infra/terraform
    - name: Terraform Plan
      run: terraform plan -input=false
      working-directory: infra/terraform
    - name: Terraform Apply
      if: github.event_name == 'push'
      run: terraform apply -input=false -auto-approve
      working-directory: infra/terraform
    - name: Restore backend
      if: always()
      run: mv backend.tf.bak backend.tf || true
      working-directory: infra/terraform
    - name: Cleanup
      if: always()
      run: |
        rm -f terraform.tfstate terraform.tfstate.backup
      working-directory: infra/terraform
