name: Terraform

on:
  push:
    branches: [ main ]
    paths:
      - 'infra/terraform/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'infra/terraform/**'

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Disable Azure backend for CI/CD
      run: mv backend.tf backend.tf.bak || true
      working-directory: infra/terraform
    - name: Terraform Init
      run: terraform init -backend=false
      working-directory: infra/terraform
    - name: Import existing resources
      run: |
        SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        RG_NAME="visitor-counter-rg"
        
        # Import resource group
        az group exists --name $RG_NAME && terraform import -input=false azurerm_resource_group.rg /subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME || true
        
        # Import virtual network
        az network vnet show --resource-group $RG_NAME --name visitor-counter-vnet 2>/dev/null && terraform import -input=false azurerm_virtual_network.visitor-counter_vnet $RG_NAME/visitor-counter-vnet || true
        
        # Import AKS cluster
        az aks show --resource-group $RG_NAME --name visitor-counter-aks 2>/dev/null && terraform import -input=false azurerm_kubernetes_cluster.aks $RG_NAME/visitor-counter-aks || true
        
        # Import PostgreSQL server
        az postgres flexible-server show --resource-group $RG_NAME --name visitor-counter-postgres-ne 2>/dev/null && terraform import -input=false azurerm_postgresql_flexible_server.postgres /subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.DBforPostgreSQL/flexibleServers/visitor-counter-postgres-ne || true
        
        # Import ACR
        az acr show --resource-group $RG_NAME --name visitorcounteracr 2>/dev/null && terraform import -input=false azurerm_container_registry.acr $RG_NAME/visitorcounteracr || true
        
        # Import Key Vault
        az keyvault show --resource-group $RG_NAME --name visitor-kv-20260410 2>/dev/null && terraform import -input=false azurerm_key_vault.kv $RG_NAME/visitor-kv-20260410 || true
      working-directory: infra/terraform
    - name: Terraform Plan
      run: terraform plan
      working-directory: infra/terraform
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve
      working-directory: infra/terraform
    - name: Restore backend
      if: always()
      run: mv backend.tf.bak backend.tf || true
      working-directory: infra/terraform
    - name: Cleanup
      if: always()
      run: |
        rm -f terraform.tfstate terraform.tfstate.backup
      working-directory: infra/terraform