name: Terraform

on:
  push:
    branches: [ main ]
    paths:
      - 'infra/terraform/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'infra/terraform/**'

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Disable Azure backend for CI/CD
      run: mv backend.tf backend.tf.bak || true
      working-directory: infra/terraform
    - name: Terraform Init
      run: terraform init -backend=false
      working-directory: infra/terraform
    - name: Import existing resources
      run: |
        SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        RG_NAME="visitor-counter-rg"
        KV_NAME="visitor-kv-20260410"
        
        # Import resource group
        az group exists --name $RG_NAME && terraform import -input=false azurerm_resource_group.rg /subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME || true
        
        # Import virtual network
        az network vnet show --resource-group $RG_NAME --name visitor-counter-vnet 2>/dev/null && terraform import -input=false azurerm_virtual_network.visitor-counter_vnet /subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.Network/virtualNetworks/visitor-counter-vnet || true
        
        # Import subnet
        az network vnet subnet show --resource-group $RG_NAME --vnet-name visitor-counter-vnet --name visitor-counter-aks-subnet 2>/dev/null && terraform import -input=false azurerm_subnet.aks_subnet /subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.Network/virtualNetworks/visitor-counter-vnet/subnets/visitor-counter-aks-subnet || true
        
        # Import AKS cluster
        az aks show --resource-group $RG_NAME --name visitor-counter-aks 2>/dev/null && terraform import -input=false azurerm_kubernetes_cluster.aks /subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.ContainerService/managedClusters/visitor-counter-aks || true
        
        # Import PostgreSQL server
        az postgres flexible-server show --resource-group $RG_NAME --name visitor-counter-postgres-ne 2>/dev/null && terraform import -input=false azurerm_postgresql_flexible_server.postgres /subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.DBforPostgreSQL/flexibleServers/visitor-counter-postgres-ne || true
        
        # Import PostgreSQL database
        az postgres flexible-server db show --resource-group $RG_NAME --server-name visitor-counter-postgres-ne --database-name visitorcounter 2>/dev/null && terraform import -input=false azurerm_postgresql_flexible_server_database.db /subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.DBforPostgreSQL/flexibleServers/visitor-counter-postgres-ne/databases/visitorcounter || true
        
        # Import ACR
        az acr show --resource-group $RG_NAME --name visitorcounteracr 2>/dev/null && terraform import -input=false azurerm_container_registry.acr /subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.ContainerRegistry/registries/visitorcounteracr || true
        
        # Import Key Vault
        az keyvault show --resource-group $RG_NAME --name $KV_NAME 2>/dev/null && terraform import -input=false azurerm_key_vault.kv /subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.KeyVault/vaults/$KV_NAME || true
        
        # Import Key Vault access policies
        CURRENT_OBJECT_ID=$(az ad signed-in-user show --query objectId -o tsv 2>/dev/null || echo "")
        if [ -n "$CURRENT_OBJECT_ID" ]; then
          terraform import -input=false azurerm_key_vault_access_policy.current /subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.KeyVault/vaults/$KV_NAME/objectId/$CURRENT_OBJECT_ID || true
        fi
        
        AKS_IDENTITY=$(az aks show --resource-group $RG_NAME --name visitor-counter-aks --query identityProfile.kubeletidentity.objectId -o tsv 2>/dev/null || echo "")
        if [ -n "$AKS_IDENTITY" ]; then
          terraform import -input=false azurerm_key_vault_access_policy.aks_identity /subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG_NAME/providers/Microsoft.KeyVault/vaults/$KV_NAME/objectId/$AKS_IDENTITY || true
        fi
        
        # Import Key Vault secrets using correct format: <keyvault-name>/<secret-name>
        terraform import -input=false azurerm_key_vault_secret.acr_login_server $KV_NAME/acr-login-server || true
        terraform import -input=false azurerm_key_vault_secret.db_host $KV_NAME/db-host || true
        terraform import -input=false azurerm_key_vault_secret.db_user $KV_NAME/db-user || true
        terraform import -input=false azurerm_key_vault_secret.db_password $KV_NAME/ConnectionStrings--DefaultConnection || true
        terraform import -input=false azurerm_key_vault_secret.postgres_password $KV_NAME/postgres-password || true
      working-directory: infra/terraform
    - name: Terraform Plan
      run: terraform plan
      working-directory: infra/terraform
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve
      working-directory: infra/terraform
    - name: Restore backend
      if: always()
      run: mv backend.tf.bak backend.tf || true
      working-directory: infra/terraform
    - name: Cleanup
      if: always()
      run: |
        rm -f terraform.tfstate terraform.tfstate.backup
      working-directory: infra/terraform