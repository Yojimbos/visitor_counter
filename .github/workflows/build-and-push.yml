name: Build and Push to ACR

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'src/**'
      - '.github/workflows/build-and-push.yml'

env:
  IMAGE_NAME: visitor-counter
  ACR_NAME: visitorcounteracr

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag (timestamp)
        id: tag
        run: |
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          echo "tag=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "Generated tag: $TIMESTAMP"

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build & Push
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.tag }}

          docker build \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest \
            -f src/VisitorCounter/Dockerfile ./src/VisitorCounter

          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

      - name: Output image
        run: |
          echo "Image pushed:"
          echo "$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ steps.tag.outputs.tag }}"