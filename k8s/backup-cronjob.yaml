apiVersion: batch/v1
kind: CronJob
metadata:
  name: visitor-counter-db-backup
spec:
  schedule: "0 3 * * 0"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: backup-data
              emptyDir: {}
          initContainers:
            - name: dump-postgres
              image: postgres:15
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
                  export PGPASSWORD="$DB_PASSWORD"
                  export PGSSLMODE=require
                  pg_dump \
                    --host="$DB_HOST" \
                    --username="$DB_USER" \
                    --dbname="$DB_NAME" \
                    --clean \
                    --if-exists \
                    --no-owner \
                    --no-privileges | gzip -c > "/backup/visitorcounter-${TIMESTAMP}.sql.gz"
              env:
                - name: DB_HOST
                  valueFrom:
                    secretKeyRef:
                      name: visitor-counter-secret
                      key: DB_HOST
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: visitor-counter-secret
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: visitor-counter-secret
                      key: DB_PASSWORD
                - name: DB_NAME
                  value: visitorcounter
              volumeMounts:
                - name: backup-data
                  mountPath: /backup
          containers:
            - name: upload-backup
              image: mcr.microsoft.com/azure-cli:2.61.0
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  az storage blob upload-batch \
                    --destination "$BACKUP_STORAGE_CONTAINER" \
                    --account-name "$BACKUP_STORAGE_ACCOUNT" \
                    --account-key "$BACKUP_STORAGE_KEY" \
                    --source /backup \
                    --destination-path postgres
              env:
                - name: BACKUP_STORAGE_ACCOUNT
                  valueFrom:
                    secretKeyRef:
                      name: visitor-counter-backup-secret
                      key: BACKUP_STORAGE_ACCOUNT
                - name: BACKUP_STORAGE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: visitor-counter-backup-secret
                      key: BACKUP_STORAGE_KEY
                - name: BACKUP_STORAGE_CONTAINER
                  valueFrom:
                    secretKeyRef:
                      name: visitor-counter-backup-secret
                      key: BACKUP_STORAGE_CONTAINER
              volumeMounts:
                - name: backup-data
                  mountPath: /backup
