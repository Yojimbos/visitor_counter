apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: visitor-counter
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: visitor-counter
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
