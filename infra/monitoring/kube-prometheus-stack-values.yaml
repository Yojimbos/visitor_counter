grafana:
  enabled: true
  adminUser: admin
  service:
    type: ClusterIP
  persistence:
    enabled: true
    size: 5Gi
  defaultDashboardsTimezone: browser
  sidecar:
    datasources:
      enabled: true
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      isDefault: false
      editable: true

alertmanager:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 15d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi

prometheusOperator:
  admissionWebhooks:
    patch:
      enabled: true

kube-state-metrics:
  enabled: true

nodeExporter:
  enabled: true
